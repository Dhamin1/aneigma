<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveWire &mdash; Aenigma</title>
  <link rel="icon" type="image/avif" href="logo.avif" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --bg: #efefef;
      --bg-nav: #1c1c1c;
      --text: #111111;
      --muted: #888888;
      --accent: #e8391e;
      --accent-h: #d02e14;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ── NAV ─────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 1160px;
      height: 60px;
      background: var(--bg-nav);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      box-shadow: 0 4px 32px rgba(0,0,0,.16);
    }

    .nav-logo {
      width: 38px; height: 38px;
      background: #2b2b2b;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    @media (max-width: 760px) {
      nav { width: calc(100% - 24px); top: 10px; border-radius: 12px; }
    }

    /* ── HERO ────────────────────────────────────────────── */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
    }

    /* ── LOGIN OVERLAY ───────────────────────────────────── */
    #loginOverlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 55%, #16213e 100%);
      overflow: hidden;
      transition: opacity 0.55s ease;
    }

    /* subtle animated grid */
    #loginOverlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,57,30,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,57,30,.07) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 22s linear infinite;
    }

    @keyframes gridDrift {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    /* glowing orb */
    #loginOverlay::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,57,30,.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 28px;
      padding: 52px 48px 46px;
      width: min(460px, calc(100vw - 40px));
      box-shadow:
        0 32px 80px rgba(0,0,0,.55),
        0 0 0 1px rgba(232,57,30,.12),
        inset 0 1px 0 rgba(255,255,255,.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: cardIn 0.65s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(48px) scale(.90); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-logo {
      width: 60px; height: 60px;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 26px;
      box-shadow:
        0 0 0 2.5px rgba(232,57,30,.45),
        0 8px 28px rgba(232,57,30,.28);
    }

    .login-logo img { width: 100%; height: 100%; object-fit: cover; }

    .login-title {
      font-family: 'Algerian', serif;
      font-size: 42px;
      color: #fff;
      letter-spacing: .05em;
      margin-bottom: 8px;
      text-shadow: 0 0 48px rgba(232,57,30,.6);
    }

    .login-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,.4);
      font-weight: 400;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 42px;
    }

    .login-label {
      align-self: flex-start;
      font-size: 11.5px;
      font-weight: 500;
      color: rgba(255,255,255,.48);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #studentIdInput {
      width: 100%;
      padding: 15px 20px;
      font-size: 18px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
      margin-bottom: 22px;
      letter-spacing: .02em;
    }

    #studentIdInput::placeholder { color: rgba(255,255,255,.22); }

    #studentIdInput:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,.10);
      box-shadow: 0 0 0 3.5px rgba(232,57,30,.18);
    }

    #loginBtn {
      width: 100%;
      padding: 16px;
      font-size: 15.5px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #e8391e 0%, #ff6b35 100%);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s, filter .2s;
      box-shadow: 0 6px 24px rgba(232,57,30,.42);
    }

    #loginBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(232,57,30,.58);
      filter: brightness(1.09);
    }

    #loginBtn:active { transform: translateY(0); }

    #loginError {
      margin-top: 16px;
      font-size: 13px;
      font-weight: 500;
      color: #ff7070;
      display: none;
    }

    .shake { animation: shake .38s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-7px); }
      75%      { transform: translateX(7px); }
    }

    /* ── CONTEST TIMER ───────────────────────────────────── */
    #contestTimer {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 500;
      background: var(--bg-nav);
      color: #fff;
      border-radius: 14px;
      padding: 10px 18px 10px 14px;
      display: none;          /* shown via JS */
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.07);
      animation: timerIn .5s ease both;
    }

    @keyframes timerIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #contestTimer .t-icon { font-size: 18px; line-height: 1; }

    #contestTimer .t-label {
      display: block;
      font-size: 10.5px;
      color: rgba(255,255,255,.42);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .09em;
      line-height: 1;
      margin-bottom: 3px;
    }

    #contestTimer .t-value {
      font-size: 17px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: .04em;
    }

    #contestTimer .t-student {
      font-size: 11px;
      color: rgba(255,255,255,.3);
      font-weight: 400;
      margin-top: 2px;
      letter-spacing: .03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100px;
    }
  </style>
</head>

<body>

  <!-- LOGIN OVERLAY -->
  <div id="loginOverlay" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <div class="login-card">
      <div class="login-logo">
        <img src="logo.avif" alt="LiveWire logo" />
      </div>
      <h1 class="login-title" id="loginTitle">AENIGMA</h1>
      <p class="login-subtitle">Enter your Student ID to begin</p>

      <label class="login-label" for="studentIdInput">Student ID</label>
      <input
        type="text"
        id="studentIdInput"
        placeholder="e.g. lw-abcd"
        autocomplete="off"
        spellcheck="false"
        autofocus
      />

      <button id="loginBtn">Start Contest &rarr;</button>
      <p id="loginError" role="alert">Please enter a valid Student ID.</p>
    </div>
  </div>

  <!-- CONTEST TIMER -->
  <div id="contestTimer" aria-label="Elapsed time">
    <span class="t-icon">&#9203;</span>
    <div>
      <span class="t-label">Elapsed</span>
      <span class="t-value" id="timerDisplay">00:00:00</span>
      <div class="t-student" id="timerStudent"></div>
    </div>
  </div>

  <!-- NAV -->
  <nav>
    <a href="https://www.thelivewire.club/" class="nav-logo" aria-label="LiveWire">
      <img src="logo.avif" alt="LiveWire" style="width:100%;height:100%;border-radius:9px;object-fit:cover;" />
    </a>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <h1 style="margin-top:32px; font-size:clamp(50px, 10vw, 120px); font-weight:normal; font-family:'Algerian', serif; color:var(--text); line-height:1.1; margin-bottom:40px; white-space:nowrap;">
      <a href="q1l1.html" style="color:inherit; cursor:pointer; text-decoration:none;">click</a> to <b>start</b>
    </h1>

    <button id="proceedsBtn"
      style="background-color:#ff8c00; color:white; border:none; border-radius:12px; padding:24px 64px; font-size:40px; font-weight:bold; cursor:pointer; transition:all .1s ease; outline:none; z-index:1000; text-transform:uppercase;">
      PROCEED
    </button>
  </section>

  <script>
    /* ── LOGIN ── */
    const overlay   = document.getElementById('loginOverlay');
    const loginBtn  = document.getElementById('loginBtn');
    const idInput   = document.getElementById('studentIdInput');
    const errMsg    = document.getElementById('loginError');
    const timerWrap = document.getElementById('contestTimer');
    const timerDisp = document.getElementById('timerDisplay');
    const timerStu  = document.getElementById('timerStudent');

    // Visiting the login page clears any previous session
    // so users must re-login if they return here.
    localStorage.removeItem('contestStudentId');
    localStorage.removeItem('contestStartTime');

    function dismissOverlay() {
      overlay.style.opacity = '0';
      overlay.style.pointerEvents = 'none';
      setTimeout(() => { overlay.style.display = 'none'; }, 560);
    }

    function doLogin() {
      const val = idInput.value.trim();
      if (!val) {
        errMsg.style.display = 'block';
        // Re-trigger shake
        errMsg.classList.remove('shake');
        void errMsg.offsetWidth;
        errMsg.classList.add('shake');
        return;
      }
      errMsg.style.display = 'none';
      localStorage.setItem('contestStudentId', val);
      if (!localStorage.getItem('contestStartTime')) {
        localStorage.setItem('contestStartTime', String(Date.now()));
      }
      dismissOverlay();
      startTimer();
    }

    loginBtn.addEventListener('click', doLogin);
    idInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });

    /* ── TIMER ── */
    function startTimer() {
      timerWrap.style.display = 'flex';
      const sid = localStorage.getItem('contestStudentId') || '';
      timerStu.textContent = sid ? 'ID: ' + sid : '';

      const t0 = parseInt(localStorage.getItem('contestStartTime') || String(Date.now()), 10);

      function tick() {
        const sec = Math.floor((Date.now() - t0) / 1000);
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = sec % 60;
        timerDisp.textContent =
          String(h).padStart(2,'0') + ':' +
          String(m).padStart(2,'0') + ':' +
          String(s).padStart(2,'0');
      }
      tick();
      setInterval(tick, 1000);
    }

    /* ── PROCEEDS BUTTON ── */
    const btn = document.getElementById('proceedsBtn');

    btn.addEventListener('mouseenter', () => {
      btn.style.position = 'fixed';
      const maxX = window.innerWidth  - btn.offsetWidth;
      const maxY = window.innerHeight - btn.offsetHeight;
      btn.style.left = Math.max(0, Math.floor(Math.random() * maxX)) + 'px';
      btn.style.top  = Math.max(0, Math.floor(Math.random() * maxY)) + 'px';
    });

    btn.addEventListener('click', (e) => {
      e.preventDefault();
      window.open("https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1", "_blank");
    });
  </script>


  <script src="tracker.js"></script>
</body>
</html>
