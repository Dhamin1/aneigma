<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveWire</title>
    <link rel="icon" type="image/avif" href="logo.avif" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg: #efefef;
            --bg-nav: #1c1c1c;
            --text: #111111;
            --muted: #888888;
            --accent: #e8391e;
            --accent-h: #d02e14;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ── NAV ───────────────────────────────────────────── */
        nav {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 1160px;
            height: 60px;
            background: var(--bg-nav);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.16);
        }

        .nav-logo {
            width: 38px;
            height: 38px;
            background: #2b2b2b;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .nav-logo svg {
            width: 20px;
            height: 20px;
        }

        .nav-btn {
            font-size: 13.5px;
            font-weight: 500;
            color: #fff;
            background: var(--accent);
            border-radius: 100px;
            padding: 9px 20px 9px 11px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.18s, transform 0.15s;
            flex-shrink: 0;
        }

        .nav-btn:hover {
            background: var(--accent-h);
            transform: translateY(-1px);
        }

        .nav-btn .circle {
            width: 22px;
            height: 22px;
            background: rgba(255, 255, 255, 0.20);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 300;
            line-height: 1;
        }

        /* ── HERO ──────────────────────────────────────────── */
        #hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 24px 80px;
            gap: 0;
        }

        .hero-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(72px, 13vw, 140px);
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.025em;
            line-height: 1;
            margin-bottom: 60px;
        }

        /* ── VIDEO PLAYER ───────────────────────────────────── */
        .video-container {
            position: relative;
            width: 640px;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            background: #000;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-container:hover .controls-overlay {
            opacity: 1;
        }

        .play-pause-btn {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: transform 0.2s;
        }

        .play-pause-btn:hover {
            transform: scale(1.1);
        }

        .play-pause-btn svg {
            width: 28px;
            height: 28px;
        }

        .progress-bar-container {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            transition: height 0.2s;
        }

        .progress-bar-container:hover {
            height: 8px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            pointer-events: none;
        }

        /* ── RESPONSIVE ─────────────────────────────────────── */
        @media (max-width: 760px) {
            nav {
                width: calc(100% - 24px);
                top: 10px;
                border-radius: 12px;
            }

            .nav-links,
            .nav-btn {
                display: none;
            }

            .nav-hamburger {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <section id="hero">
        <h1
            style="font-family: 'Algerian', serif; font-weight: bold; font-size: clamp(50px, 10vw, 120px); margin-bottom: 40px;">
            LEVEL 5
        </h1>

        <div class="video-container">
            <video id="customVideo" src="play.mp4" playsinline></video>
            <div class="controls-overlay">
                <button class="play-pause-btn" id="playPauseBtn">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
                <div class="progress-bar-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: center;">
            <a href="q2l4.html"
                style="background-color: #ff8c00; color: white; border: none; border-radius: 12px; padding: 16px 32px; font-size: 20px; font-weight: bold; cursor: pointer; transition: background 0.2s ease; display: inline-block; text-decoration: none;">PROCEED</a>
        </div>
    </section>

    <script>


        const video = document.getElementById('customVideo');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');

        function togglePlay() {
            if (video.paused) {
                video.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                video.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        playPauseBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        video.addEventListener('timeupdate', () => {
            const progress = (video.currentTime / video.duration) * 100;
            progressBar.style.width = `${progress}%`;
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        // Popup Logic
        (function () {
            const _d = [84,104,101,32,80,97,115,115,119,111,114,100,32,105,115,32,50,57,52,55,53,51,48];
            const popup = document.createElement('div');
            popup.innerHTML = _d.map(c => String.fromCharCode(c)).join('');
            popup.style.cssText = 'position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #e8391e; color: white; padding: 16px 32px; border-radius: 12px; font-weight: bold; z-index: 9999; box-shadow: 0 8px 24px rgba(0,0,0,0.3); transition: opacity 0.5s ease; opacity: 1; font-size: 24px; text-transform: uppercase; font-family: \'DM Sans\', sans-serif;';
            document.body.appendChild(popup);
            setTimeout(() => {
                popup.style.opacity = '0';
                setTimeout(() => popup.remove(), 500);
            }, 4000);
        })();

    </script>

  <!-- CONTEST TIMER -->
  <style>
    #contestTimer {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 9000;
      background: #1c1c1c;
      color: #fff;
      border-radius: 14px;
      padding: 10px 18px 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.07);
      font-family: 'DM Sans', sans-serif;
      animation: timerIn .5s ease both;
    }
    @keyframes timerIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #contestTimer .t-icon { font-size: 18px; line-height: 1; }
    #contestTimer .t-label {
      display: block;
      font-size: 10.5px;
      color: rgba(255,255,255,.42);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .09em;
      line-height: 1;
      margin-bottom: 3px;
    }
    #contestTimer .t-value {
      font-size: 17px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: .04em;
    }
    #contestTimer .t-student {
      font-size: 11px;
      color: rgba(255,255,255,.32);
      font-weight: 400;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }
  </style>
  <div id="contestTimer">
    <span class="t-icon">&#9203;</span>
    <div>
      <span class="t-label">Elapsed</span>
      <span class="t-value" id="timerDisplay">00:00:00</span>
      <div class="t-student" id="timerStudent"></div>
    </div>
  </div>
  <script>
    (function(){
      var t0 = parseInt(localStorage.getItem('contestStartTime') || '0', 10) || Date.now();
      var sid = localStorage.getItem('contestStudentId') || '';
      var disp = document.getElementById('timerDisplay');
      var stu  = document.getElementById('timerStudent');
      if (stu && sid) stu.textContent = 'ID: ' + sid;
      function tick(){
        var sec = Math.floor((Date.now() - t0) / 1000);
        var h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
        if(disp) disp.textContent =
          String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>

  <script>
    // Prevent back-button navigation — redirect to login/register page instead
    (function () {
      history.pushState(null, '', location.href);
      window.addEventListener('popstate', function () {
        history.pushState(null, '', location.href);
        window.location.replace('index.html');
      });
    })();
  </script>

  <script src="tracker.js"></script>
</body>

</html>
