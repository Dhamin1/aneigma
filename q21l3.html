<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveWire</title>
    <link rel="icon" type="image/avif" href="logo.avif" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg: #efefef;
            --bg-nav: #1c1c1c;
            --text: #111111;
            --muted: #888888;
            --accent: #000000;
            --accent-h: #000000;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ── NAV ───────────────────────────────────────────── */
        nav {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 1160px;
            height: 60px;
            background: var(--bg-nav);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.16);
        }

        .nav-logo {
            width: 38px;
            height: 38px;
            background: #2b2b2b;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .nav-logo svg {
            width: 20px;
            height: 20px;
        }

        .nav-btn {
            font-size: 13.5px;
            font-weight: 500;
            color: #fff;
            background: var(--accent);
            border-radius: 100px;
            padding: 9px 20px 9px 11px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.18s, transform 0.15s;
            flex-shrink: 0;
        }

        .nav-btn:hover {
            background: var(--accent-h);
            transform: translateY(-1px);
        }

        .nav-btn .circle {
            width: 22px;
            height: 22px;
            background: rgba(255, 255, 255, 0.20);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 300;
            line-height: 1;
        }

        /* ── HERO ──────────────────────────────────────────── */
        #hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 24px 80px;
            gap: 0;
        }

        .hero-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(72px, 13vw, 140px);
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.025em;
            line-height: 1;
            margin-bottom: 60px;
        }

        /* ── RESPONSIVE ─────────────────────────────────────── */
        @media (max-width: 760px) {
            nav {
                width: calc(100% - 24px);
                top: 10px;
                border-radius: 12px;
            }

            .nav-links,
            .nav-btn {
                display: none;
            }

            .nav-hamburger {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <section id="hero">
        <h1
            style="font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: clamp(80px, 15vw, 180px); color: var(--accent); margin-bottom: 20px; letter-spacing: -2px; line-height: 1;">
            ERROR <font color="red">403</font>
        </h1>

        <p style="font-family: 'Aptos', sans-serif; font-size: 24px; color: var(--text); margin-bottom: 10px;">
            Refresh page to continue.
        </p>

        <p style="font-family: 'Aptos', sans-serif; font-size: 20px; color: var(--muted); margin-bottom: 0;">
            REF Code: 102 97 105 108
        </p>
    </section>

    <script>
        // Check if page load is a reload
        const isReload = (window.performance && window.performance.navigation && window.performance.navigation.type === 1) ||
            (window.performance && window.performance.getEntriesByType && window.performance.getEntriesByType('navigation').length > 0 && window.performance.getEntriesByType('navigation')[0].type === 'reload');

        if (isReload) {
            window.location.href = 'q22l3.html';
        }
    </script>

  <!-- CONTEST TIMER -->
  <style>
    #contestTimer {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 9000;
      background: #1c1c1c;
      color: #fff;
      border-radius: 14px;
      padding: 10px 18px 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.07);
      font-family: 'DM Sans', sans-serif;
      animation: timerIn .5s ease both;
    }
    @keyframes timerIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #contestTimer .t-icon { font-size: 18px; line-height: 1; }
    #contestTimer .t-label {
      display: block;
      font-size: 10.5px;
      color: rgba(255,255,255,.42);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .09em;
      line-height: 1;
      margin-bottom: 3px;
    }
    #contestTimer .t-value {
      font-size: 17px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: .04em;
    }
    #contestTimer .t-student {
      font-size: 11px;
      color: rgba(255,255,255,.32);
      font-weight: 400;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }
  </style>
  <div id="contestTimer">
    <span class="t-icon">&#9203;</span>
    <div>
      <span class="t-label">Elapsed</span>
      <span class="t-value" id="timerDisplay">00:00:00</span>
      <div class="t-student" id="timerStudent"></div>
    </div>
  </div>
  <script>
    (function(){
      var t0 = parseInt(localStorage.getItem('contestStartTime') || '0', 10) || Date.now();
      var sid = localStorage.getItem('contestStudentId') || '';
      var disp = document.getElementById('timerDisplay');
      var stu  = document.getElementById('timerStudent');
      if (stu && sid) stu.textContent = 'ID: ' + sid;
      function tick(){
        var sec = Math.floor((Date.now() - t0) / 1000);
        var h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
        if(disp) disp.textContent =
          String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>

  <script>
    // Prevent back-button navigation — redirect to login/register page instead
    (function () {
      history.pushState(null, '', location.href);
      window.addEventListener('popstate', function () {
        history.pushState(null, '', location.href);
        window.location.replace('index.html');
      });
    })();
  </script>

  <script src="tracker.js"></script>
</body>

</html>
